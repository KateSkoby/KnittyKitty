name: Release KnittyKitty

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0"
        required: true
        default: "v1.0.0"

  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows exe
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore Windows app
        shell: pwsh
        run: |
          dotnet restore .\src\KnittyKitty.App\KnittyKitty.App.csproj

      - name: Publish Windows x64 app
        shell: pwsh
        run: |
          dotnet publish .\src\KnittyKitty.App\KnittyKitty.App.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:Platform=x64 `
            -p:WindowsPackageType=None `
            -p:PublishSingleFile=false `
            --output .\artifacts\windows

      - name: Create Windows zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\dist

          Compress-Archive `
            -Path .\artifacts\windows\* `
            -DestinationPath .\dist\KnittyKitty-Windows-x64.zip `
            -Force

      - name: Upload Windows release artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: dist/KnittyKitty-Windows-x64.zip


  build-wasm:
    name: Build Uno WebAssembly
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Install WebAssembly workload
        shell: pwsh
        run: |
          dotnet workload install wasm-tools
          dotnet workload restore .\src\KnittyKitty.Uno\KnittyKitty.Uno\KnittyKitty.Uno.csproj

      - name: Restore Uno WebAssembly app
        shell: pwsh
        run: |
          dotnet restore .\src\KnittyKitty.Uno\KnittyKitty.Uno\KnittyKitty.Uno.csproj `
            -p:EnableWindowsTargeting=true

      - name: Publish Uno WebAssembly app
        shell: pwsh
        run: |
          dotnet publish .\src\KnittyKitty.Uno\KnittyKitty.Uno\KnittyKitty.Uno.csproj `
            --configuration Release `
            --framework net10.0-browserwasm `
            -p:EnableWindowsTargeting=true `
            --output .\artifacts\wasm-publish

      - name: Prepare GitHub Pages folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\artifacts\wasm-site

          if (Test-Path ".\artifacts\wasm-publish\wwwroot") {
            Copy-Item ".\artifacts\wasm-publish\wwwroot\*" ".\artifacts\wasm-site" -Recurse -Force
          }
          else {
            Copy-Item ".\artifacts\wasm-publish\*" ".\artifacts\wasm-site" -Recurse -Force
          }

          New-Item -ItemType File -Force -Path ".\artifacts\wasm-site\.nojekyll"

          $indexPath = ".\artifacts\wasm-site\index.html"

          if (Test-Path $indexPath) {
            $content = Get-Content $indexPath -Raw
            $content = $content -replace '<base href="/" />', '<base href="/KnittyKitty/" />'
            $content = $content -replace '<base href="/">', '<base href="/KnittyKitty/">'
            Set-Content -Path $indexPath -Value $content
            Copy-Item $indexPath ".\artifacts\wasm-site\404.html" -Force
          }
          else {
            Write-Error "index.html was not found in published WebAssembly output."
          }

      - name: Create WebAssembly zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\dist

          Compress-Archive `
            -Path .\artifacts\wasm-site\* `
            -DestinationPath .\dist\KnittyKitty-WebAssembly.zip `
            -Force

      - name: Upload WebAssembly release artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-release
          path: dist/KnittyKitty-WebAssembly.zip

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/wasm-site


  deploy-pages:
    name: Deploy Uno WebAssembly to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-wasm

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-wasm
      - deploy-pages

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            "release-assets/windows-release/KnittyKitty-Windows-x64.zip#Windows x64 exe version" \
            "release-assets/wasm-release/KnittyKitty-WebAssembly.zip#Uno WebAssembly browser version" \
            --title "KnittyKitty ${{ steps.tag.outputs.tag }}" \
            --notes "Release contains Windows x64 executable version and Uno Platform WebAssembly browser version. Browser version is also deployed to GitHub Pages." \
            --target "${{ github.sha }}"
