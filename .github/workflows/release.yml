name: Release KnittyKitty

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0"
        required: true
        default: "v1.0.0"

  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore tests/KnittyKitty.Tests/KnittyKitty.Tests.csproj

      - name: Run unit tests
        run: dotnet test tests/KnittyKitty.Tests/KnittyKitty.Tests.csproj --configuration Release --no-restore


  build-windows:
    name: Build Windows exe
    runs-on: windows-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore Windows app
        run: dotnet restore .\src\KnittyKitty.App\KnittyKitty.App.csproj

      - name: Publish Windows x64 app
        run: >
          dotnet publish .\src\KnittyKitty.App\KnittyKitty.App.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:Platform=x64
          -p:WindowsPackageType=None
          -p:PublishSingleFile=false
          --output .\artifacts\windows

      - name: Create Windows zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\dist
          Compress-Archive `
            -Path .\artifacts\windows\* `
            -DestinationPath .\dist\KnittyKitty-Windows-x64.zip `
            -Force

      - name: Upload Windows release artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: dist/KnittyKitty-Windows-x64.zip


  build-wasm:
    name: Build Uno WebAssembly
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Install WebAssembly workload
        run: dotnet workload install wasm-tools

      - name: Restore Uno WebAssembly app
        run: dotnet restore src/KnittyKitty.Uno/KnittyKitty.Uno/KnittyKitty.Uno.csproj

      - name: Publish Uno WebAssembly app
        run: >
          dotnet publish src/KnittyKitty.Uno/KnittyKitty.Uno/KnittyKitty.Uno.csproj
          --configuration Release
          --framework net10.0-browserwasm
          --output artifacts/wasm-publish

      - name: Prepare GitHub Pages folder
        shell: bash
        run: |
          mkdir -p artifacts/wasm-site

          if [ -d "artifacts/wasm-publish/wwwroot" ]; then
            cp -a artifacts/wasm-publish/wwwroot/. artifacts/wasm-site/
          else
            cp -a artifacts/wasm-publish/. artifacts/wasm-site/
          fi

          touch artifacts/wasm-site/.nojekyll

          if [ -f "artifacts/wasm-site/index.html" ]; then
            sed -i 's#<base href="/" />#<base href="/KnittyKitty/" />#g' artifacts/wasm-site/index.html
            sed -i 's#<base href="/">#<base href="/KnittyKitty/">#g' artifacts/wasm-site/index.html
            cp artifacts/wasm-site/index.html artifacts/wasm-site/404.html
          fi

      - name: Create WebAssembly zip
        shell: bash
        run: |
          mkdir -p dist
          cd artifacts/wasm-site
          zip -r ../../dist/KnittyKitty-WebAssembly.zip .

      - name: Upload WebAssembly release artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-release
          path: dist/KnittyKitty-WebAssembly.zip

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/wasm-site


  deploy-pages:
    name: Deploy Uno WebAssembly to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-wasm

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-wasm
      - deploy-pages

    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            "release-assets/windows-release/KnittyKitty-Windows-x64.zip#Windows x64 exe version" \
            "release-assets/wasm-release/KnittyKitty-WebAssembly.zip#Uno WebAssembly browser version" \
            --title "KnittyKitty ${{ steps.tag.outputs.tag }}" \
            --notes "Release contains Windows x64 executable version and Uno Platform WebAssembly browser version." \
            --target "${{ github.sha }}"
